name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    outputs:
      tag_name: ${{ steps.get_version.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl xlrd pyinstaller

      - name: Build executable
        run: |
          pyinstaller -F -w --icon=icon/file-excel-fill.ico --name "Excel转换器_${{ steps.get_version.outputs.tag }}" --add-data "bank_rules.json;." excel_converter.py

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/Excel转换器_${{ steps.get_version.outputs.tag }}.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}