name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl xlrd customtkinter darkdetect pyinstaller

      - name: Build executable
        run: pyinstaller "Excel转换器.spec"

      - name: Rename artifact
        shell: pwsh
        run: Move-Item "dist/Excel转换器.exe" "dist/Excel转换器_${{ steps.get_version.outputs.version }}.exe"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/Excel转换器_${{ steps.get_version.outputs.version }}.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
